<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
</head>
<body>

<nav>
  <div class="container">
    <a class="site-name" href="/">Courtney A. Shearer</a>
    {{ range .Site.Menus.main }}
    <a href="{{ .URL }}" {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>{{ .Name }}</a>
    {{ end }}
  </div>
</nav>

<div class="page-content">
  {{ block "main" . }}{{ end }}
</div>

<footer>
  <div class="container">
    <span>© {{ now.Year }} Courtney A. Shearer</span>
    <span>Built with <a href="https://gohugo.io">Hugo</a> · Hosted on GitHub Pages</span>
  </div>
</footer>

</body>
</html>
